name: Update Golem RSS

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Update feed
        run: python scripts/update_feed.py --db data/articles.sqlite --out public/rss.xml --limit 1000
      - name: Detect feed changes
        id: feed-changes
        run: |
          if git diff --quiet -- data/articles.sqlite public/rss.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Configure Pages
        if: steps.feed-changes.outputs.changed == 'true'
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        if: steps.feed-changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy to GitHub Pages
        if: steps.feed-changes.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Commit feed data
        if: steps.feed-changes.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update Golem RSS"
          file_pattern: "data/articles.sqlite public/rss.xml"
